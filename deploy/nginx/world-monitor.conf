# World Monitor API — reverse proxy for Cloudflare Tunnel
# Cloudflare Tunnel → localhost:80 (Nginx) → upstream services

upstream api_server {
    server 127.0.0.1:3001;
    keepalive 16;
}

upstream ais_relay {
    server 127.0.0.1:3004;
    keepalive 8;
}

server {
    listen 80;
    server_name api-monitor.cooperation.tw;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # Health check for monitoring
    location = /health {
        proxy_pass http://api_server/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # API endpoints → Express API server
    location /api/ {
        proxy_pass http://api_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Allow large responses (bootstrap endpoint)
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
    }

    # AIS relay endpoints
    location /relay/ {
        proxy_pass http://ais_relay/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }

    # AIS WebSocket upgrade
    location /relay/ws {
        proxy_pass http://ais_relay/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Block everything else
    location / {
        return 404 '{"error":"Not found"}';
        add_header Content-Type application/json;
    }
}
